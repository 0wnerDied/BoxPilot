name: Package version changes

on:
  push:
    branches:
      - master
    paths:
      - src/BoxPilot.App/BoxPilot.App.csproj
  workflow_dispatch:

permissions:
  contents: read

jobs:
  version:
    name: Detect version change
    runs-on: ubuntu-latest
    outputs:
      application: ${{ steps.metadata.outputs.application }}
      changed: ${{ steps.metadata.outputs.changed }}
      version: ${{ steps.metadata.outputs.version }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Read package metadata
        id: metadata
        shell: bash
        env:
          BEFORE_SHA: ${{ github.event.before }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail

          project=src/BoxPilot.App/BoxPilot.App.csproj
          application="$(
            dotnet msbuild "$project" -getProperty:AssemblyName -nologo |
              tr -d '\r'
          )"
          version="$(
            dotnet msbuild "$project" -getProperty:Version -nologo |
              tr -d '\r'
          )"

          if [[ ! "$application" =~ ^[0-9A-Za-z][0-9A-Za-z._-]*$ ]]; then
            echo "Invalid application name: $application" >&2
            exit 1
          fi
          if [[ ! "$version" =~ ^[0-9A-Za-z][0-9A-Za-z.+-]*$ ]]; then
            echo "Invalid application version: $version" >&2
            exit 1
          fi

          changed=false
          if [[ "$EVENT_NAME" == workflow_dispatch ]]; then
            changed=true
          elif [[ "$BEFORE_SHA" =~ ^0+$ ]]; then
            changed=true
          elif ! git cat-file -e "$BEFORE_SHA:$project" 2>/dev/null; then
            changed=true
          else
            previous_version="$(
              git show "$BEFORE_SHA:$project" |
                sed -n 's|.*<Version>\([^<]*\)</Version>.*|\1|p' |
                head -n 1 |
                tr -d '\r'
            )"
            if [[ "$previous_version" != "$version" ]]; then
              changed=true
            fi
          fi

          echo "application=$application" >> "$GITHUB_OUTPUT"
          echo "changed=$changed" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

  package:
    name: Package ${{ matrix.platform }} ${{ matrix.architecture }}
    needs: version
    if: ${{ needs.version.outputs.changed == 'true' }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            rid: osx-arm64
            platform: macos
            architecture: arm64
            extension: dmg
          - runner: macos-latest
            rid: osx-x64
            platform: macos
            architecture: x64
            extension: dmg
          - runner: windows-latest
            rid: win-x64
            platform: windows
            architecture: x64
            extension: exe
          - runner: windows-latest
            rid: win-arm64
            platform: windows
            architecture: arm64
            extension: exe

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Package ${{ matrix.rid }}
        shell: bash
        run: ./scripts/publish.sh "${{ matrix.rid }}"

      - name: Upload package
        uses: actions/upload-artifact@v7
        with:
          path: >-
            dist/${{ matrix.rid }}/${{ needs.version.outputs.application }}-${{ matrix.platform }}-${{ matrix.architecture }}-${{ needs.version.outputs.version }}.${{ matrix.extension }}
          if-no-files-found: error
          archive: false
